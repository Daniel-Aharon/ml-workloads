apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Note: Remote KFP manifests are downloaded by the GitHub Actions workflow
# and extracted to ./upstream/ before kustomize build runs

resources:
  - ./upstream/manifests/kustomize/cluster-scoped-resources
  - ./upstream/manifests/kustomize/env/platform-agnostic-pns
  - storageclass-gp3.yaml

namespace: kubeflow
