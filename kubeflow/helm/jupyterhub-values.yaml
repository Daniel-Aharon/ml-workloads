hub:
  # Control plane (JupyterHub hub process)
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # SQLite database for hub state (persistent across restarts)
  db:
    pvc:
      enabled: true
      size: 1Gi
      storageClassName: gp3-ebs

  service:
    type: ClusterIP  # Internal only; accessed via proxy

  # Dummy auth: allow all users (demo only; use LDAP/OAuth in production)
  config:
    JupyterHub.authenticator_class: "dummy"
    DummyAuthenticator.password: "test"

proxy:
  # NGINX reverse proxy (routes HTTP to user pods)
  service:
    type: LoadBalancer  # AWS NLB; use Ingress in production for cost

  chp:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi

singleuser:
  # User notebook pods (created on-demand)
  image:
    name: jupyter/scipy-notebook
    tag: "latest"  # In production, pin to specific version

  cpu:
    request: 500m
    limit: 1000m

  memory:
    request: 512Mi
    limit: 1Gi

  # Persistent home directory per user
  storage:
    type: dynamic
    capacity: 1Gi
    storageClassName: gp3-ebs

  # JupyterLab instead of classic notebook
  defaultUrl: "/lab"

  # Auto-install KFP SDK in each notebook
  initContainers:
    - name: pip-install
      image: jupyter/scipy-notebook:latest
      command:
        - "sh"
        - "-c"
        - "pip install kubeflow-pipelines"
      volumeMounts:
        - name: notebook-volume
          mountPath: /home/jovyan
